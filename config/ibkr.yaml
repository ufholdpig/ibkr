# IBKR Gateway 连接配置
# 所有参数均可通过环境变量覆盖
# 注意：端口号与账户类型无关，仅用于本地连接 IB Gateway
# 4001/4002 为常用端口，可根据实际 IB Gateway 配置调整

ibkr:
  # 市场数据源: "auto" (IBKR优先, 失败自动回退yfinance), "ibkr", "yfinance"
  market_data_source: "yfinance"
  approval_required: false  # false: 信号直接提交 IBKR，无需手动审批
  
  gateway:
    #host: "127.0.0.1"
    host: "192.168.2.18"
    port: 4002  # IB Gateway (4001=实盘, 4002=Paper)
    client_id: 0  # 由 SessionManager 自动管理（0 表示自动分配）
    timeout: 15
    max_retries: 3
    retry_delay: 2
    account_id: "DU4011059"  # 子账号 ID（Paper=DU4011059，实盘=实盘账号）
  
  # Watch 守护进程配置
  # templates: 以模版为中心，每个模版绑定适用的标的列表
  watch:
    poll_interval: 5
    indicator_refresh_minutes: 30
    template_dir: "strategy/templates"
    # 实盘冷却倍率: Paper 冷却 x 此值 = 实盘冷却 (4x = 15min→60min, 30min→120min)
    real_cooldown_multiplier: 4

    cooldown_minutes:
      default: 20

    # 候选池：所有候选标的（UniverseSelector 从中筛选）
    # 后续由 UniverseSelector 每日盘后动态评估
    candidate_pool:
      # AI/云计算/半导体
      - NVDA
      - AVGO
      - MRVL
      - AMD
      - CRM
      # 金融科技
      - PYPL
      - SQ
      - COIN
      - V
      # 半导体制造
      - ASML
      - TSM
      - AMAT
      - KLAC
      # 云计算/SaaS
      - MSFT
      - GOOGL
      - AMZN
      - SNOW
      - WDAY
      # 防御型
      - JPM
      - BAC
      - WFC

    # 已禁用策略模板（保留空配置，仅确保 watch 进程不报错）
    templates:
      trend_entry: []
      trend_entry.1: []
      trend_entry.2: []
      dip_buy: []
      ma_buy: []
      long_take_profit: []
      long_stop_loss: []
      short_take_profit: []
      short_stop_loss: []
      trend_entry_strict: []
      value_buy: []
      futures_trend: []

  # 风控引擎配置
  # tfsa_limitation=true 时硬编码 TFSA 规则（年交易 ≤80, 禁止做空, 禁止日内交易）
  # Paper 测试时 fail_closed=false，实盘部署前设为 true
  risk_engine:
    enabled: true
    tfsa_limitation: true     # false=保证金/普通账户
    fail_closed: false        # true: 风控不可用时拒绝交易（实盘必须 true）
    position_limit_pct: 20.0

  # 候选池选择器配置 (UniverseSelector)
  # 每个交易日盘后由 post-market 调用，动态刷新候选池
  universe_selector:
    enabled: true
    
    # 最大持仓数量: 1-2 只（实验期保守）
    max_positions: 2
    min_positions: 1
    
    # 入围条件：至少满足 N 个条件
    required_passing: 4
    
    # 最低得分门槛
    min_score_threshold: 4.0
    
    # 持仓评估参数
    position_review:
      # 盈利超过此比例触发止盈（减半仓）
      take_profit_pct: 20.0
      # 亏损超过此比例触发止损（清仓）
      stop_loss_pct: -10.0
      # 减仓比例（当池内排名下降但未完全出池时）
      reduce_ratio: 0.5
    
    # 黑名单：永不纳入
    blacklist:
      - F      # 福特，历史表现差
      - TSLA   # 波动太大
      - VST    # 能源股，周期性强
      - CEG    # 核能，政策风险
    
    # 建仓参数
    opening:
      # 默认仓位（账户净值的百分比）
      default_position_size_pct: 10.0
      # 建仓候选数量（从池中选 top N 建议）
      top_n: 3