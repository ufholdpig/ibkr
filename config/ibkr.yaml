ibkr:
  market_data_source: yfinance
  approval_required: false
  trading:
    allow_short_selling: false  # true=允许做空，false=Long Only（禁止主动做空）
  gateway:
    host: 192.168.2.18
    port: 4002
    client_id: 0
    timeout: 15
    max_retries: 3
    retry_delay: 2
    account_id: DU4011059
  watch:
    poll_interval: 5
    indicator_refresh_minutes: 30
    template_dir: strategy/templates
    real_cooldown_multiplier: 4
    cooldown_minutes:
      default: 20
    templates:
      strong_accumulation:
      - AMAT
      - KLAC
      - LRCX
      - GS
      - PG
      - AMD
      - ASML
      - SNOW
      - LLY
      - JNJ
      trend_entry: []
      trend_entry.1: []
      trend_entry.2: []
      dip_buy: []
      ma_buy: []
      long_take_profit: []
      long_stop_loss: []
      short_take_profit: []
      short_stop_loss: []
      trend_entry_strict: []
      value_buy: []
      futures_trend: []
  risk_engine:
    enabled: true
    tfsa_limitation: true
    fail_closed: false
    position_limit_pct: 20.0
