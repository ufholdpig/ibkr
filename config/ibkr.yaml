# IBKR Gateway 连接配置
# 所有参数均可通过环境变量覆盖
# 注意：端口号与账户类型无关，仅用于本地连接 IB Gateway
# 4001/4002 为常用端口，可根据实际 IB Gateway 配置调整

ibkr:
  # 市场数据源: "auto" (IBKR优先, 失败自动回退yfinance), "ibkr", "yfinance"
  market_data_source: "yfinance"
  gateway:
    #host: "127.0.0.1"
    host: "192.168.2.18"
    port: 4002  # IB Gateway (4001=实盘, 4002=Paper)
    client_id: 0  # 由 SessionManager 自动管理（0 表示自动分配）
    timeout: 15
    max_retries: 3
    retry_delay: 2
    account_id: "DU4011059"  # 子账号 ID（Paper=DU4011059，实盘=实盘账号）
  
  # Watch 守护进程配置
  # templates: 以模版为中心，每个模版绑定适用的标的列表
  watch:
    poll_interval: 5
    indicator_refresh_minutes: 30
    template_dir: "strategy/templates"
    # 实盘冷却倍率: Paper 冷却 x 此值 = 实盘冷却 (4x = 15min→60min, 30min→120min)
    real_cooldown_multiplier: 4

    cooldown_minutes:
      default: 20
      F: 15
      AAPL: 15
      NVDA: 30
      AVGO: 30
      VRT: 30

    templates:
      trend_entry: [COST, BCE, BAC, BA, GOOGL, CRDO]             # 趋势入场
      trend_entry.1: [COST, BCE, BAC, BA, GOOGL, CRDO]           # 趋势入场v1(宽松)
      trend_entry.2: [MTB, TFC, USB]           # 趋势入场v2(优化)
      dip_buy: [NVDA, VRT]                                       # 深跌买入
      ma_buy: [AAPL, DLR]                                        # 均线弱势买入
      long_take_profit: [DLR, META, MSFT, AMZN]                  # 多头止盈 — 替代原 bounce_sell
      long_stop_loss: [NVDA, DLR, VRT, META, MSFT, AMZN, GOOGL]  # 多头止损
      short_take_profit: [F, VST, CEG, TSLA]                     # 空头止盈 — 跌深时买入平仓
      short_stop_loss: [F, VST, CEG, TSLA]                       # 空头止损 — 急涨时买入平仓
      trend_entry_strict: []
      value_buy: []
      futures_trend: []

  # TFSA 风控引擎配置
  # Paper 测试时 fail_closed=false，实盘部署前设为 true
  risk_engine:
    enabled: true
    fail_closed: false       # true: 风控不可用时拒绝交易（实盘必须 true）
    approval_required: false  # false: 信号直接提交 IBKR，无需手动审批
    position_limit_pct: 20.0
    max_trades_per_year: 80
    forbid_short_sell: true
    forbid_day_trading: true
