# IBKR 策略参数配置
# 版本：v1.0
# 日期：2026-04-24
# 说明：所有策略逻辑参数化，便于调整与回测

# 全局风控参数
global_risk:
  max_position_weight: 0.20  # 单只股票最大仓位 20%
  max_daily_trades: 3        # 每日最大交易次数 (避免过度交易)
  max_annual_trades: 50      # 年度最大交易次数 (TFSA 合规，<80)
  stop_loss_pct: 0.15        # 止损阈值 15%

# 策略 1: 核心底仓策略 (高股息 + 低波动)
# 逻辑：长期持有高股息、低波动的蓝筹股，季度再平衡
strategy_core_holdings:
  enabled: true
  target_allocation: 0.60    # 目标仓位占比 60%
  rebalance_frequency: "quarterly" # 再平衡频率
  holdings:
    - symbol: "RY.TO"
      target_weight: 0.20
      min_dividend_yield: 0.04
      max_pe_ratio: 15.0
    - symbol: "TD.TO"
      target_weight: 0.20
      min_dividend_yield: 0.04
      max_pe_ratio: 15.0
    - symbol: "XIC.TO"
      target_weight: 0.20
      min_dividend_yield: 0.02
      max_pe_ratio: 25.0
  trigger_threshold: 0.05    # 仓位偏离 5% 触发再平衡

# 策略 2: 季节性增强策略 (日历效应)
# 逻辑：利用市场季节性规律（如 1-3 月小盘效应，9 月低点布局）
strategy_seasonal:
  enabled: true
  target_allocation: 0.25    # 目标仓位占比 25%
  rules:
    # 规则 1: "Sell in May" 反向操作 (11 月买入，4 月卖出)
    - name: "Winter_Bull"
      buy_month: 11
      sell_month: 4
      symbol: "XIC.TO"       # 全市场 ETF
      action: "BUY"
    # 规则 2: "January Effect" (1 月小盘股效应)
    - name: "Jan_SmallCap"
      buy_month: 1
      sell_month: 3
      symbol: "XSM.TO"       # 小盘股 ETF
      action: "BUY"
    # 规则 3: "September Dip" (9 月低点布局)
    - name: "Sep_Dip_Buy"
      buy_month: 9
      sell_month: 12
      symbol: "VCN.TO"       # 加拿大盘股
      action: "BUY"
  stop_loss_pct: 0.10        # 季节性策略止损更严

# 策略 3: 价值反转策略 (均值回归)
# 逻辑：买入被错杀的优质股 (P/E < 10, 股息率 > 4%, 短期跌幅 > 15%)
strategy_value_reversal:
  enabled: true
  target_allocation: 0.15    # 目标仓位占比 15%
  scan_universe:             # 扫描范围
    - "RY.TO"
    - "TD.TO"
    - "BNS.TO"
    - "ENB.TO"
    - "TRP.TO"
  conditions:
    max_pe_ratio: 10.0       # P/E < 10
    min_dividend_yield: 0.04 # 股息率 > 4%
    min_price_drop: 0.15     # 短期跌幅 > 15% (20 日)
    min_volume: 100000       # 最小成交量
  entry_trigger: "price_drop" # 触发条件：价格跌破阈值
  exit_trigger: "mean_reversion" # 退出条件：回归均值 (涨回 5% 或 P/E > 12)
  take_profit_pct: 0.08      # 止盈 8%
  stop_loss_pct: 0.12        # 止损 12%

# 回测配置
backtest:
  start_date: "2015-01-01"
  end_date: "2025-12-31"
  initial_capital: 50000.0   # 初始资金 $50k
  commission_rate: 0.005     # 手续费 0.5%
  slippage_pct: 0.001        # 滑点 0.1%
