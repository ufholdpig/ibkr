# F 反弹卖出策略 (Ford Bounce Sell)
# 当 F 出现明显超买或大幅急涨时，卖出 20 股获利
# 提高卖出门槛，避免过快清仓

strategy_id: "F_BOUNCE_SELL_001"
name: "F反弹卖出"
description: "F明显超买或大幅急涨时卖出20股，避免过快清仓"
enabled: true
priority: 15
# --- v2 字段 ---
weight: 1.0          # 策略权重(0-2)，影响冲突解决
state: ACTIVE         # 生命周期状态
type: bounce_sell
optimization:
  enabled: false      # 是否允许学习引擎自动调参
regime_weights:
  BULL: 1.0
  BEAR: 1.0
  SIDEWAYS: 1.0

signal_factors: ["market_data"]

conditions:
  operator: OR
  rules:
    - type: rsi
      operator: ">"
      threshold: 78
    - type: change_pct
      period: 5
      operator: ">"
      threshold: 8.0
    - operator: AND
      rules:
        - type: price_vs_ma
          period: 50
          operator: ">"
        - type: random
          threshold: 0.15

action:
  type: "MARKET_SELL"
  quantity: 20
  ticker: "F"
  tif: "DAY"

metadata:
  author: "Hermes Agent"
  created_at: "2026-05-07"
  version: "1.0.0"
  tags:
    - "ford"
    - "swing-trade"
    - "profit-taking"
