# 硬性止损策略 (Stop Loss Strategy)
# 当亏损超过 15% 时，市价卖出全部持仓

strategy_id: "STOP_LOSS_001"
name: "硬性止损"
description: "当亏损超过 15% 时，市价卖出全部持仓，控制风险"
enabled: true
priority: 100  # 高优先级，优先执行
# --- v2 字段 ---
weight: 1.0          # 策略权重(0-2)，影响冲突解决
state: ACTIVE         # 生命周期状态
type: stop_loss
optimization:
  enabled: false      # 是否允许学习引擎自动调参
regime_weights:
  BULL: 1.0
  BEAR: 1.0
  SIDEWAYS: 1.0
exclude_symbols: ["F"]  # F 由专用高抛低吸策略管理，不清仓

signal_factors: ["market_data"]

# 触发条件
conditions:
 - type: "price_vs_cost"
   operator: "<"
   threshold_ratio: 0.85 # 市价 < 成本 * 0.85 (即亏损 > 15%)

# 执行动作
action:
  type: "MARKET_SELL"
  quantity: "ALL"    # 卖出全部持仓
  tif: "DAY"
  
  risk:
    max_loss_percent: 15.0  # 最大允许亏损 15%

# 元数据
metadata:
  author: "Hermes Agent"
  created_at: "2026-04-21"
  version: "1.0.0"
  tags:
    - "risk-management"
    - "stop-loss"
    - "mvp"
