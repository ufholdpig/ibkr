# 价值低估买入策略 (Value Buy Strategy)
# 当市价低于平均成本 10% 时，以限价单买入

strategy_id: "VALUE_BUY_001"
name: "价值低估买入"
description: "当市价低于平均成本 10% 时，以限价单买入，摊薄成本"
enabled: true
priority: 10
# --- v2 字段 ---
weight: 1.0          # 策略权重(0-2)，影响冲突解决
state: ACTIVE         # 生命周期状态
type: value_buy
optimization:
  enabled: false      # 是否允许学习引擎自动调参
regime_weights:
  BULL: 1.0
  BEAR: 1.0
  SIDEWAYS: 1.0
exclude_symbols: ["F"]  # F 由专用高抛低吸策略管理

signal_factors: ["market_data"]

# 触发条件
conditions:
 - type: "price_vs_cost"
   operator: "<"
   threshold_ratio: 0.90 # 市价 < 成本 * 0.9 (即低于成本 10%)
   # symbol: "AAPL" # 可选，不指定则对所有持仓生效

# 执行动作
action:
  type: "LIMIT_BUY"
  quantity: 10       # 固定买入 10 股
  price_offset: -0.02  # 限价 = 市价 * 0.98 (低于市价 2%)
  tif: "DAY"
  
  # 风险控制
  risk:
    max_position_percent: 5.0  # 单只股票最大持仓占比 5%
    max_order_value: 1000.0    # 单笔订单最大金额 1000 USD

# 元数据
metadata:
  author: "Hermes Agent"
  created_at: "2026-04-21"
  version: "1.0.0"
  tags:
    - "value-investing"
    - "buy-the-dip"
    - "mvp"
