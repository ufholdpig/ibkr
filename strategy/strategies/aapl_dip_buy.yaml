strategy_id: "AAPL_DIP_BUY_001"
name: "AAPL回调买入"
description: "AAPL超卖或急跌时买入10股，摊薄持仓成本"
enabled: true
priority: 10
# --- v2 字段 ---
weight: 1.0          # 策略权重(0-2)，影响冲突解决
state: ACTIVE         # 生命周期状态
type: dip_buy
optimization:
  enabled: false      # 是否允许学习引擎自动调参
regime_weights:
  BULL: 1.0
  BEAR: 1.0
  SIDEWAYS: 1.0

signal_factors: ["market_data"]

conditions:
  operator: OR
  rules:
    - type: rsi
      operator: "<"
      threshold: 45
    - type: change_pct
      period: 5
      operator: "<"
      threshold: -2.0
    - operator: AND
      rules:
        - type: price_vs_ma
          period: 20
          operator: "<"
        - type: random
          threshold: 0.4

action:
  type: "LIMIT_BUY"
  quantity: 10
  ticker: "AAPL"
  price_offset: -0.005
  tif: "DAY"

metadata:
  author: "Hermes Agent"
  created_at: "2026-05-11"
  version: "1.0.0"
  tags:
    - "aapl"
    - "swing-trade"
    - "cost-averaging"
