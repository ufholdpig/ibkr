# F 均线买入策略 (Ford MA Buy)
# 当 F 价格跌破均线或小幅回调时买入 20 股
# 作为 f_dip_buy 的补充，提供更多买入机会补充库存

strategy_id: "F_MA_BUY_001"
name: "F均线买入"
description: "F弱势回调或跌破均线时买入20股，补充库存"
enabled: true
priority: 9
# --- v2 字段 ---
weight: 1.0          # 策略权重(0-2)，影响冲突解决
state: ACTIVE         # 生命周期状态
type: ma_buy
optimization:
  enabled: false      # 是否允许学习引擎自动调参
regime_weights:
  BULL: 1.0
  BEAR: 1.0
  SIDEWAYS: 1.0

signal_factors: ["market_data"]

conditions:
  operator: OR
  rules:
    - type: rsi
      operator: "<"
      threshold: 55
    - type: change_pct
      period: 5
      operator: "<"
      threshold: -1.5
    - operator: AND
      rules:
        - type: price_vs_ma
          period: 20
          operator: "<"
        - type: random
          threshold: 0.4

action:
  type: "LIMIT_BUY"
  quantity: 20
  ticker: "F"
  price_offset: -0.02
  tif: "DAY"

metadata:
  author: "Hermes Agent"
  created_at: "2026-05-14"
  version: "1.0.0"
  tags:
    - "ford"
    - "swing-trade"
    - "ma-reversion"
