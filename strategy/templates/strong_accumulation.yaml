# Strong Accumulation 策略配置
# 文档：docs/strong_accumulation-design.md
# 状态：conditions/action/risk 已补全 (2026-07-19)

strategy_id: "strong_accumulation"
name: "强势股蓄力池"
description: "基于板块龙头扫描的强势股候选池，每日盘后动态更新 top 10"
enabled: true
priority: 15
weight: 1.0
state: ACTIVE
type: strong_accumulation

# ============================================================
# 板块龙头股 — universe-refresh scope=full 时的全量扫描范围
# 手动维护，修改频率低
# ============================================================
sectors:
  # AI/半导体
  ai_semicon:
    name: "AI/半导体"
    leaders:
      - NVDA
      - AVGO
      - MRVL
      - AMD
      - AMAT
      - KLAC
      - ASML
      - TSM

  # 云计算/企业软件
  cloud_software:
    name: "云计算/企业软件"
    leaders:
      - MSFT
      - CRM
      - SNOW
      - WDAY

  # 互联网/平台
  internet_platform:
    name: "互联网/平台"
