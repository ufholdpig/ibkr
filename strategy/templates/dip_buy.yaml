strategy_id: "DIP_BUY_{symbol}"
name: "{symbol} 回调买入"
description: "{symbol} 超卖或急跌时买入，等待回调机会"
enabled: true
priority: 10
weight: 1.0
state: ACTIVE
type: dip_buy
regime_weights:
  BULL: 1.0
  BEAR: 1.0
  SIDEWAYS: 1.0
signal_factors: ["market_data"]
conditions:
  operator: OR
  rules:
    - type: rsi
      operator: "<"
      threshold: 35
    - type: change_pct
      period: 5
      operator: "<"
      threshold: -5.0
    - operator: AND
      rules:
        - type: price_vs_ma
          period: 20
          operator: "<"
        - type: change_pct
          period: 1
          operator: "<"
          threshold: -2.0
action:
  type: "LIMIT_BUY"
  quantity: 5
  ticker: "{symbol}"
  price_offset: -0.005
  tif: "DAY"
