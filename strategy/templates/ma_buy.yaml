strategy_id: "MA_BUY_{symbol}"
name: "{symbol} 均线买入"
description: "{symbol} 弱势回调或跌破均线时买入，等待入场时机"
enabled: true
priority: 9
weight: 1.0
state: ACTIVE
type: ma_buy
regime_weights:
  BULL: 1.0
  BEAR: 1.0
  SIDEWAYS: 1.0
signal_factors: ["market_data"]
conditions:
  operator: OR
  rules:
    - type: rsi
      operator: "<"
      threshold: 45
    - type: change_pct
      period: 5
      operator: "<"
      threshold: -2.5
    - operator: AND
      rules:
        - type: price_vs_ma
          period: 20
          operator: "<"
        - type: change_pct
          period: 1
          operator: "<"
          threshold: -1.0
action:
  type: "LIMIT_BUY"
  quantity: 5
  ticker: "{symbol}"
  price_offset: -0.005
  tif: "DAY"
