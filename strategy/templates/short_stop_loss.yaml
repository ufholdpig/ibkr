strategy_id: "SHORT_STOP_LOSS_{symbol}"
name: "{symbol} 空头止损"
description: "{symbol} 明显超买或急涨时买入平仓，控制空头亏损"
enabled: true
priority: 100
weight: 1.0
state: ACTIVE
type: short_stop_loss
regime_weights:
  BULL: 1.0
  BEAR: 1.0
  SIDEWAYS: 1.0
signal_factors: ["market_data"]
conditions:
  operator: OR
  rules:
    - type: rsi
      operator: ">"
      threshold: 70
    - type: change_pct
      period: 5
      operator: ">"
      threshold: 5.0
    - operator: AND
      rules:
        - type: price_vs_ma
          period: 20
          operator: ">"
        - type: change_pct
          period: 1
          operator: ">"
          threshold: 2.0
action:
  type: "MARKET_BUY"
  quantity: "ALL"
  ticker: "{symbol}"
  tif: "DAY"
